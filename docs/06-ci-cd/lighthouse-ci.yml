name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json

  adr-check:
    runs-on: ubuntu-latest
    name: ADR Compliance Check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ADR directory exists
        run: |
          if [ ! -d "docs/02-adr" ]; then
            echo "❌ docs/02-adr directory missing"
            exit 1
          fi
          echo "✅ ADR directory exists"

      - name: Check CLAUDE.md exists
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "❌ CLAUDE.md missing"
            exit 1
          fi
          echo "✅ CLAUDE.md exists"
